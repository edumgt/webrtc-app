name: Build and Push Docker Images to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: webrtc-frontend
            dockerfile: Dockerfile.frontend
          - image_name: webrtc-signaling
            dockerfile: Dockerfile.signaling

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ secrets.AWS_REGION }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kube-manifests/01-namespace.yml
          kubectl apply -f kube-manifests/02-webrtc-deployment.yml
          kubectl apply -f kube-manifests/03-webrtc-loadbalancer-service.yml
          kubectl apply -f kube-manifests/04-webrtc-frontend-deployment.yml

      - name: Inject runtime frontend signaling URL
        run: |
          kubectl -n webrtc set env deployment/webrtc-frontend \
            VITE_SIGNAL_URL="${{ vars.VITE_SIGNAL_URL }}" \
            VITE_SIGNAL_PORT="${{ vars.VITE_SIGNAL_PORT }}"

      - name: Restart deployments to pull latest images
        run: |
          kubectl -n webrtc rollout restart deployment/webrtc-signaling
          kubectl -n webrtc rollout restart deployment/webrtc-frontend

      - name: Wait for rollout
        run: |
          kubectl -n webrtc rollout status deployment/webrtc-signaling --timeout=180s
          kubectl -n webrtc rollout status deployment/webrtc-frontend --timeout=180s
